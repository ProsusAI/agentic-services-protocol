name: Validate Schemas

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate schemas
        run: python validate_specs.py

      - name: Generate spec/ from source/
        run: python generate_schemas.py

      - name: Check spec/ is up to date
        run: |
          if [ -n "$(git diff --name-only spec/)" ]; then
            echo "ERROR: spec/ is out of date. Run 'python generate_schemas.py' and commit the output."
            git diff spec/
            exit 1
          fi
