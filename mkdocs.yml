site_name: Agentic Services Protocol (ASP)
site_url: https://prosusai.github.io/agentic-services-protocol
repo_url: https://github.com/ProsusAI/agentic-services-protocol
repo_name: GitHub

theme:
  name: material
  logo: assets/asp_blue.png
  favicon: assets/asp_white_no_text.png
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.expand
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight
    - header.autohide
  font: false
  palette:
    - scheme: default
      primary: white
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

extra_css:
  - https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap
  - stylesheets/extra.css

plugins:
  - search
  - macros:
      module_name: main

nav:
  - Home: index.md
  - Getting Started:
    - Core Concepts: documentation/core-concepts.md
    - Implementation Checklist: documentation/implementation-checklist.md
    - Schema Authoring: documentation/schema-authoring.md
  - Specification:
    - Overview: specification/overview.md
    - Discovery: specification/discovery.md
    - Catalog: specification/catalog.md
    - Checkout & Fulfillment: specification/fulfillment.md
    - Order Tracking: specification/order-tracking.md
    - Reviews: specification/reviews.md
    - Personalization: specification/personalization.md
    - Domain Profiles: specification/domains.md
    - Reference: specification/reference.md
  - Playground: playground.md
  - Roadmap: documentation/roadmap.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
